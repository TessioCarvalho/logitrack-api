# ===================================================================
# CONFIGURAÇĂO DO BANCO DE DADOS (POSTGRESQL NO DOCKER)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/logitrack_wms_tms
spring.datasource.username=logitrack_user
spring.datasource.password=logitrack_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇĂO DO HIBERNATE 7 (JPA)
# ===================================================================
# O Hibernate apenas valida o banco (o Flyway se encarrega de criar)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desativa o aviso chato de visualizaçăo de sessăo aberta (Opcional, limpa o log)
spring.jpa.open-in-view=false

# ===================================================================
# CONFIGURAÇĂO DO FLYWAY MIGRATIONS
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration